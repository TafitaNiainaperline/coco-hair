<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Huile Coco</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-left">
    <div class="login-branding">
      <img src="assets/logo.png" alt="Huile Coco" class="login-logo">
      <h1>Huile<span>Coco</span></h1>
      <p>Tableau de bord administrateur</p>
    </div>
    <div class="login-info">
      <h3>Bienvenue</h3>
      <p>Accédez à votre tableau de bord pour gérer les commandes, consulter les statistiques et configurer votre boutique.</p>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <h2>Connexion Admin</h2>
      <p class="login-subtitle">Réservé au propriétaire</p>

      <form onsubmit="loginAdmin(event)" class="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="adminEmail" required autofocus>
        </div>
        <div class="form-group password-group">
          <label>Mot de passe</label>
          <div class="password-wrapper">
            <input type="password" id="adminPassword" required>
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login-large">Se connecter</button>
      </form>


    </div>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
