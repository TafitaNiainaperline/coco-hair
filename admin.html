<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Huile Coco — Gestion des commandes</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="admin-container">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <h2>Huile Coco</h2>
      <p>Admin</p>
    </div>
    <nav class="admin-nav">
      <a href="#" class="nav-item active" onclick="showSection('orders', this)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Commandes
      </a>
      <a href="#" class="nav-item" onclick="showSection('stats', this)">
        <img src="assets/statistics-svgrepo-com.svg" alt="Statistiques" class="nav-icon">
        Statistiques
      </a>
      <a href="#" class="nav-item" onclick="showSection('settings', this)">
        <img src="assets/settings-svgrepo-com.svg" alt="Paramètres" class="nav-icon">
        Paramètres
      </a>
      <a href="#" class="nav-item" onclick="logout()" style="margin-top:auto;border-top:1px solid rgba(255,255,255,0.1);padding-top:20px;color:#E74C3C;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Déconnexion
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <!-- Header -->
    <header class="admin-header">
      <button class="hamburger-btn" onclick="toggleSidebar()" style="display:none;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1>Tableau de bord</h1>
      <div class="admin-actions">
        <button onclick="exportOrdersPDF()" class="btn-secondary">Exporter PDF</button>
        <button onclick="refreshOrders()" class="btn-secondary">Actualiser</button>
      </div>
    </header>

    <!-- Orders Section -->
    <section id="ordersSection" class="admin-section active">
      <div class="section-header">
        <h2>Commandes</h2>
        <div class="filters">
          <select id="statusFilter" onchange="filterOrders()">
            <option value="">Tous les statuts</option>
            <option value="en attente de paiement">En attente de paiement</option>
            <option value="payé">Payé</option>
            <option value="expédié">Expédié</option>
            <option value="livré">Livré</option>
          </select>
        </div>
      </div>

      <div class="orders-list" id="ordersList">
        <p class="loading">Chargement des commandes...</p>
      </div>
    </section>

    <!-- Stats Section -->
    <section id="statsSection" class="admin-section">
      <div class="stats-grid" id="statsGrid">
      </div>
    </section>

    <!-- Settings Section -->
    <section id="settingsSection" class="admin-section">
      <div class="settings-form">
        <div class="settings-header">
          <img src="assets/settings-svgrepo-com.svg" alt="Paramètres" class="settings-icon">
          <h2>Paramètres du propriétaire</h2>
        </div>
        <div class="form-group">
          <label>Numéro de téléphone</label>
          <input type="tel" id="ownerPhone" value="+261 34 70 20 583">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="ownerEmail" value="huilecoco@mada.mg">
        </div>
        <div class="form-group">
          <label>Ville de retrait</label>
          <input type="text" id="pickupCity" value="Fianarantsoa">
        </div>
        <button onclick="saveSettings()" class="btn-primary">Enregistrer</button>
      </div>
    </section>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal" id="orderModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeOrderModal()">×</button>
    <div id="orderDetailContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// Vérifier que seul l'admin peut accéder
window.addEventListener('DOMContentLoaded', () => {
  const user = JSON.parse(localStorage.getItem('cocoHairUser') || 'null');
  console.log('👤 Utilisateur trouvé:', user);
  if (!user || user.role !== 'admin') {
    console.log('❌ Pas admin, redirection...');
    alert('Accès réservé à l\'admin');
    window.location.href = 'login.html';
  } else {
    console.log('✅ Admin connecté');
  }
});
</script>

<script>
// Placeholder functions for onclick handlers - will be overwritten by module
window.showSection = () => console.warn('showSection not yet loaded');
window.viewOrder = () => console.warn('viewOrder not yet loaded');
window.closeOrderModal = () => console.warn('closeOrderModal not yet loaded');
window.updateOrderStatus = () => console.warn('updateOrderStatus not yet loaded');
window.deleteOrder = () => console.warn('deleteOrder not yet loaded');
window.contactCustomer = () => console.warn('contactCustomer not yet loaded');
window.filterOrders = () => console.warn('filterOrders not yet loaded');
window.refreshOrders = () => console.warn('refreshOrders not yet loaded');
window.exportOrdersPDF = () => console.warn('exportOrdersPDF not yet loaded');
window.logout = () => console.warn('logout not yet loaded');
window.toggleSidebar = () => console.warn('toggleSidebar not yet loaded');
window.saveSettings = () => console.warn('saveSettings not yet loaded');
</script>

<script type="module" src="js/admin.js"></script>
</body>
</html>
