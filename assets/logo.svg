<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FFF5E6" stroke="#D4A574" stroke-width="2"/>

  <!-- Coconut body -->
  <ellipse cx="100" cy="85" rx="45" ry="50" fill="#8B6F47"/>

  <!-- Coconut texture - darker lines -->
  <path d="M 70 70 Q 70 85 75 95" stroke="#6B5438" stroke-width="2" fill="none"/>
  <path d="M 130 70 Q 130 85 125 95" stroke="#6B5438" stroke-width="2" fill="none"/>
  <path d="M 80 60 Q 100 55 120 60" stroke="#6B5438" stroke-width="2" fill="none"/>
  <path d="M 75 80 Q 100 75 125 80" stroke="#6B5438" stroke-width="2" fill="none"/>

  <!-- Coconut shine/highlight -->
  <ellipse cx="85" cy="70" rx="12" ry="15" fill="#D4A574" opacity="0.6"/>

  <!-- Hair strands - flowing from top -->
  <path d="M 65 55 Q 55 40 50 20" stroke="#D4A574" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 85 45 Q 80 25 78 5" stroke="#E6B87F" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 115 45 Q 120 25 122 5" stroke="#D4A574" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 135 55 Q 145 40 150 20" stroke="#E6B87F" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Hair shine/gloss effect -->
  <path d="M 70 50 Q 65 35 62 15" stroke="#FDB750" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 130 50 Q 135 35 138 15" stroke="#FDB750" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Bottom coconut shell line -->
  <path d="M 60 95 Q 100 110 140 95" stroke="#6B5438" stroke-width="2" fill="none"/>

  <!-- Oil drop accent -->
  <circle cx="100" cy="130" r="8" fill="#FDB750" opacity="0.8"/>
  <circle cx="100" cy="130" r="6" fill="#FDB750" opacity="0.5"/>

  <!-- Decorative stars for premium feel -->
  <circle cx="50" cy="45" r="3" fill="#FDB750"/>
  <circle cx="150" cy="45" r="3" fill="#FDB750"/>
</svg>